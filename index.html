:root {

* { box-sizing: border-box; }
body {

  padding: 24px;
}
.container { max-width: 860px; margin: 0 auto; }
h1 { text-align: center; margin: 10px 0 6px; font-size: 30px; }
.subtitle { text-align: center; color: var(--muted); margin-bottom: 18px; }
.card {
  background: var(--card);
  border-radius: 18px;
  padding: 28px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  min-height: 390px;
  border: 1px solid var(--border);
}
.meta {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 12px;
}
.term {
  font-size: 28px;
  font-weight: 700;
  margin: 12px 0 18px;
  line-height: 1.25;
}
.question {
  font-size: 21px;
  line-height: 1.5;
  margin-bottom: 18px;
}
.answer {
  display: none;
  white-space: pre-line;
  font-size: 18px;
  line-height: 1.65;
  background: #eff6ff;
  border-left: 5px solid var(--blue);
  padding: 18px;
  border-radius: 12px;
  margin-top: 18px;
}
.buttons {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr;
  gap: 10px;
  margin-top: 22px;
}
button {
  padding: 14px 12px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: var(--blue);
  color: white;
}
button:hover { background: var(--blue-dark); }
button.secondary { background: var(--gray); }
button.secondary:hover { background: var(--gray-dark); }
.jump-box { display: flex; gap: 10px; margin-top: 14px; }
.jump-box input {
  flex: 1;
  padding: 14px;
  font-size: 16px;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
}
.jump-box button { flex: 0.45; }
.progress { margin-top: 14px; text-align: center; color: var(--muted); }
.hint { text-align: center; color: var(--muted); margin-top: 8px; font-size: 13px; }
@media (max-width: 640px) {
  body { padding: 14px; }
  h1 { font-size: 23px; }
  .card { padding: 20px; min-height: 420px; }
  .term { font-size: 22px; }
  .question { font-size: 18px; }
  .answer { font-size: 16px; }
  .buttons { grid-template-columns: 1fr; }
  .jump-box { flex-direction: column; }

</style>

let currentIndex = 0;

function loadCard() {
  const card = cards[currentIndex];
  document.getElementById("chapter").textContent = card.chapter;
  document.getElementById("cardId").textContent = "Card " + card.id;
  document.getElementById("term").textContent = card.term;
  document.getElementById("question").textContent = card.question;
  document.getElementById("answer").textContent = card.answer;
  document.getElementById("answer").style.display = "none";
  document.getElementById("progress").textContent = `${currentIndex + 1} / ${cards.length}`;
}

function showAnswer() {
  document.getElementById("answer").style.display = "block";
}

function previousCard() {
  currentIndex = (currentIndex - 1 + cards.length) % cards.length;
  loadCard();
}

function nextCard() {
  currentIndex = (currentIndex + 1) % cards.length;
  loadCard();
}

function jumpToCard() {
  const input = document.getElementById("jumpInput");
  const number = parseInt(input.value, 10);
  if (isNaN(number) || number < 1 || number > cards.length) {
    alert(`Please enter a number between 1 and ${cards.length}. / 请输入 1 到 ${cards.length} 之间的数字。`);
    return;
  }
  currentIndex = number - 1;
  loadCard();
  input.value = "";
}

document.addEventListener("keydown", function(event) {
  if (event.key === "ArrowRight") nextCard();
  if (event.key === "ArrowLeft") previousCard();
  if (event.key === " " || event.key === "Enter") showAnswer();
});

loadCard();
</script>

      let currentIndex = 0;
      function loadCard() {
        const card = cards[currentIndex];
        document.getElementById("chapter").textContent = card.chapter;
        document.getElementById("term").textContent = card.term;
        document.getElementById("question").textContent = card.question;
        document.getElementById("answer").textContent = card.answer;
        document.getElementById("answer").style.display = "none";
        document.getElementById("progress").textContent =
          `${currentIndex + 1} / ${cards.length}`;
      }
      function showAnswer() {
        document.getElementById("answer").style.display = "block";
      }
      function previousCard() {
        currentIndex = (currentIndex - 1 + cards.length) % cards.length;
        loadCard();
      }
      function jumpToCard() {
        const input = document.getElementById("jumpInput");
        const number = parseInt(input.value, 10);

        if (isNaN(number) || number < 1 || number > cards.length) {
          alert(`Please enter a number between 1 and ${cards.length}. / 请输入 1 到 ${cards.length} 之间的数字。`);
          return;
        }

        currentIndex = number - 1;
        loadCard();
        input.value = "";
      }
      function nextCard() {
        currentIndex = (currentIndex + 1) % cards.length;
        loadCard();
      }
      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowRight") nextCard();
        if (e.key === "ArrowLeft") previousCard();
        if (e.key === " " || e.key === "Enter") showAnswer();
      });
